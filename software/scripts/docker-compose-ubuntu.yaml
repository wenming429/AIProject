# LumenIM Docker Compose 配置文件 (Ubuntu 20.04)
#
# 支持局域网 IP (192.168.23.131) 和域名 (mylumenim.cfldcn.com) 访问
#
# 使用方法:
#   1. cp docker-compose-ubuntu.yaml docker-compose.yaml
#   2. 编辑 config.yaml 中的数据库密码和域名
#   3. docker-compose up -d

version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: lumenim-mysql
    restart: always
    ports:
      - '3306:3306'
    environment:
      # 修改为您的 MySQL 密码
      MYSQL_ROOT_PASSWORD: lumenim123
      MYSQL_DATABASE: go_chat
      MYSQL_USER: lumenim
      MYSQL_PASSWORD: lumenim123
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --default-time-zone='+08:00'
    networks:
      - lumenim-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plumenim123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.4-alpine
    container_name: lumenim-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - lumenim-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: lumenim-minio
    restart: always
    ports:
      - '9000:9000'   # API 端口
      - '9090:9090'   # Console 端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9090"
    networks:
      - lumenim-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: lumenim-nginx
    restart: always
    ports:
      - '80:80'       # HTTP
      - '443:443'    # HTTPS (需配置 SSL)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      lumenim_http:
        condition: service_healthy
      lumenim_comet:
        condition: service_healthy
    networks:
      - lumenim-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LumenIM HTTP 服务
  lumenim_http:
    image: gzydong/lumenim:latest
    container_name: lumenim-http
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '9501:9501'   # HTTP API
    restart: always
    volumes:
      - ./config.yaml:/work/config.yaml:ro
      - uploads:/work/uploads
      - runtime:/work/runtime
    command: http --config=/work/config.yaml
    networks:
      - lumenim-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9501/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # LumenIM WebSocket 服务
  lumenim_comet:
    image: gzydong/lumenim:latest
    container_name: lumenim-comet
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '9502:9502'   # WebSocket
    restart: always
    volumes:
      - ./config.yaml:/work/config.yaml:ro
      - runtime:/work/runtime
    command: comet --config=/work/config.yaml
    networks:
      - lumenim-network

  # LumenIM 异步队列
  lumenim_queue:
    image: gzydong/lumenim:latest
    container_name: lumenim-queue
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    volumes:
      - ./config.yaml:/work/config.yaml:ro
      - uploads:/work/uploads
      - runtime:/work/runtime
    command: queue --config=/work/config.yaml
    networks:
      - lumenim-network

  # LumenIM 定时任务
  lumenim_cron:
    image: gzydong/lumenim:latest
    container_name: lumenim-cron
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - ./config.yaml:/work/config.yaml:ro
      - uploads:/work/uploads
      - runtime:/work/runtime
    command: crontab --config=/work/config.yaml
    networks:
      - lumenim-network

networks:
  lumenim-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
  nginx_logs:
  uploads:
  runtime:
