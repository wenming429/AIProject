# LumenIM Nginx 配置文件
#
# 支持局域网 IP (192.168.23.131) 和域名 (mylumenim.cfldcn.com) 访问
#
# 配置说明:
#   - server_name: 同时支持 IP 和域名访问
#   - proxy_pass: 反向代理到后端服务

# 后端服务地址
upstream lumenim_http {
    server lumenim-http:9501;
    keepalive 64;
}

upstream lumenim_comet {
    server lumenim-comet:9502;
    keepalive 64;
}

# HTTP Server - 支持 IP 和域名
server {
    # 监听端口
    listen 80;
    
    # 服务器名称 - 支持多种访问方式
    # _ 表示默认服务器，可匹配任意 IP 或域名
    # 添加您的具体 IP 和域名
    server_name _ 192.168.23.131 mylumenim.cfldcn.com;

    # 前端静态文件 (如果前端与后端在同一服务器)
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://lumenim_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # WebSocket 支持
    location /ws {
        proxy_pass http://lumenim_comet;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 超时设置 (24小时)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # 禁用缓冲
        proxy_buffering off;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/json application/xml
               application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_disable "msie6";
}

