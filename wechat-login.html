<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微信登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* 顶部标题栏 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
    }

    .header-title {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }

    .header-icons {
      display: flex;
      gap: 16px;
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #999;
      transition: color 0.2s;
    }

    .icon-btn:hover {
      color: #666;
    }

    /* 主体内容 */
    .main-content {
      padding: 40px 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 头像区域 */
    .avatar-section {
      margin-bottom: 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* 用户名显示 */
    .username-display {
      font-size: 18px;
      color: #333;
      font-weight: 500;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .emoji {
      font-size: 16px;
    }

    /* 输入框区域 */
    .input-section {
      width: 100%;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-field {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      transition: all 0.2s;
      outline: none;
    }

    .input-field::placeholder {
      color: #bbb;
    }

    .input-field:focus {
      border-color: #07c160;
      background: #fff;
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%;
      height: 44px;
      background: #07c160;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    .login-btn:hover {
      background: #06ad56;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* 底部链接 */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .footer-link {
      font-size: 14px;
      color: #576b95;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: #4a5d82;
    }

    .divider {
      color: #ddd;
      font-size: 14px;
    }

    /* 移动端适配 */
    @media (max-width: 480px) {
      body {
        background: #fff;
      }

      .login-container {
        box-shadow: none;
        border-radius: 0;
      }

      .main-content {
        padding: 60px 24px 48px;
      }
    }

    /* 微信绿色主题色 */
    :root {
      --wechat-green: #07c160;
      --wechat-green-hover: #06ad56;
      --wechat-link: #576b95;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 顶部标题栏 -->
    <div class="header">
      <span class="header-title">微信</span>
      <div class="header-icons">
        <div class="icon-btn" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.9 9.9h-6m-6 0H1.9m16.32 4.24l4.24 4.24M6.34 17.66l-4.24 4.24"></path>
          </svg>
        </div>
        <div class="icon-btn" title="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </div>
      </div>
    </div>

    <!-- 主体内容 -->
    <div class="main-content">
      <!-- 头像 -->
      <div class="avatar-section">
        <img src="https://picsum.photos/seed/wechat/200/200" alt="头像" class="avatar" id="avatar">
      </div>

      <!-- 用户名 -->
      <div class="username-display">
        <span class="emoji">👤</span>
        <span id="displayName">W.明呗</span>
        <span class="emoji">✨</span>
      </div>

      <!-- 输入框区域 -->
      <div class="input-section">
        <div class="input-group">
          <input type="text" class="input-field" id="username" placeholder="用户名/手机号" value="">
        </div>
        <div class="input-group">
          <input type="password" class="input-field" id="password" placeholder="密码">
        </div>
      </div>

      <!-- 登录按钮 -->
      <button class="login-btn" onclick="handleLogin()">进入微信</button>

      <!-- 底部链接 -->
      <div class="footer-links">
        <a class="footer-link" onclick="switchAccount()">切换账号</a>
        <span class="divider">|</span>
        <a class="footer-link" onclick="fileTransfer()">仅传输文件</a>
      </div>
    </div>
  </div>

  <script>
    // 登录处理
    function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alert('请输入用户名和密码');
        return;
      }

      // 模拟登录
      console.log('登录中...', { username });
      alert('登录成功！');
    }

    // 切换账号
    function switchAccount() {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('username').focus();
    }

    // 仅传输文件
    function fileTransfer() {
      alert('进入文件传输助手');
    }

    // 回车登录
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });

    // 输入时更新显示名
    document.getElementById('username').addEventListener('input', function(e) {
      const displayName = document.getElementById('displayName');
      if (e.target.value) {
        displayName.textContent = e.target.value;
      } else {
        displayName.textContent = 'W.明呗';
      }
    });
  </script>
</body>
</html>
